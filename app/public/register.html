<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册 - AI小说网</title>
    <meta name="description" content="注册AI小说网账号，开启您的阅读之旅">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 440px;
            padding: 40px;
        }
        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .register-logo {
            font-size: 48px;
            margin-bottom: 15px;
        }
        .register-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        .register-subtitle {
            color: #888;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .input-group {
            position: relative;
        }
        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }
        .form-input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-input:focus {
            border-color: #667eea;
        }
        .input-hint {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .agreement {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 14px;
            color: #555;
        }
        .agreement input {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: #667eea;
        }
        .agreement a {
            color: #667eea;
            text-decoration: none;
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-register:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #555;
            font-size: 14px;
        }
        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .error-message.show {
            display: block;
        }
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .success-message.show {
            display: block;
        }
        .back-link {
            text-align: center;
            margin-top: 15px;
        }
        .back-link a {
            color: #888;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link a:hover {
            color: #667eea;
        }
        @media (max-width: 480px) {
            .register-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-header">
            <div class="register-logo">📚</div>
            <h1 class="register-title">创建账号</h1>
            <p class="register-subtitle">加入AI小说网，开启您的阅读之旅</p>
        </div>
        
        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        
        <form id="registerForm">
            <div class="form-group">
                <label class="form-label">用户名</label>
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="input-hint">用户名长度为3-20个字符，支持字母、数字、下划线</div>
            </div>
            
            <div class="form-group">
                <label class="form-label">邮箱</label>
                <div class="input-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" class="form-input" id="email" placeholder="请输入邮箱地址" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
                </div>
                <div class="input-hint">密码长度为6-20个字符</div>
            </div>
            
            <div class="form-group">
                <label class="form-label">确认密码</label>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="请再次输入密码" required>
                </div>
            </div>
            
            <div class="agreement">
                <input type="checkbox" id="agreement" required>
                <span>我已阅读并同意 <a href="/terms.html" target="_blank">服务条款</a> 和 <a href="/privacy.html" target="_blank">隐私政策</a></span>
            </div>
            
            <button type="submit" class="btn-register" id="submitBtn">
                <i class="fas fa-user-plus"></i> 立即注册
            </button>
        </form>
        
        <div class="login-link">
            已有账号？<a href="/login.html">立即登录</a>
        </div>
        
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> 返回首页</a>
        </div>
    </div>

    <script>
        // 表单提交
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const agreement = document.getElementById('agreement').checked;
            const submitBtn = document.getElementById('submitBtn');
            
            // 验证输入
            if (!username || !email || !password) {
                showError('请填写所有必填项');
                return;
            }
            
            if (username.length < 3 || username.length > 20) {
                showError('用户名长度应为3-20个字符');
                return;
            }
            
            if (!/^[a-zA-Z0-9_]+$/.test(username)) {
                showError('用户名只能包含字母、数字和下划线');
                return;
            }
            
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('请输入有效的邮箱地址');
                return;
            }
            
            if (password.length < 6 || password.length > 20) {
                showError('密码长度应为6-20个字符');
                return;
            }
            
            if (password !== confirmPassword) {
                showError('两次输入的密码不一致');
                return;
            }
            
            if (!agreement) {
                showError('请阅读并同意服务条款和隐私政策');
                return;
            }
            
            // 禁用按钮
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        email: email,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (data.code === 200) {
                    showSuccess('注册成功！即将跳转到登录页面...');
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showError(data.message || '注册失败，请稍后重试');
                }
            } catch (error) {
                console.error('注册失败:', error);
                showError('网络错误，请稍后重试');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> 立即注册';
            }
        });
        
        // 显示错误信息
        function showError(message) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            document.getElementById('successMessage').classList.remove('show');
            setTimeout(() => errorMsg.classList.remove('show'), 5000);
        }
        
        // 显示成功信息
        function showSuccess(message) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = message;
            successMsg.classList.add('show');
            document.getElementById('errorMessage').classList.remove('show');
        }
    </script>
</body>
</html>
